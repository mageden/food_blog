{{ define "main" }}
<section class="container">
  <h1 class="page-title">{{ .Title }}</h1>
  {{ with .Content }}<div class="page-content">{{ . }}</div>{{ end }}

  <div class="post-grid">
    {{ range .Pages }}
      {{ partial "post-card.html" . }}
    {{ end }}
  </div>

  {{ template "_internal/pagination.html" . }}
</section>
{{ end }}
